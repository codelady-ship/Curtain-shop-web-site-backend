databaseChangeLog:
  - changeSet:
      id: 7.2-admin-reset-delivery
      author: chatgpt
      changes:
        - sql:
            splitStatements: false
            stripComments: false
            sql: |
              ALTER TABLE IF EXISTS admins
                  ADD COLUMN IF NOT EXISTS reset_delivery_status VARCHAR(40),
                  ADD COLUMN IF NOT EXISTS reset_delivered_at TIMESTAMP,
                  ADD COLUMN IF NOT EXISTS reset_delivery_target VARCHAR(180),
                  ADD COLUMN IF NOT EXISTS reset_delivery_error VARCHAR(500);

              UPDATE admins SET reset_delivery_status = 'NONE' WHERE reset_delivery_status IS NULL;
