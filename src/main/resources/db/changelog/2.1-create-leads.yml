databaseChangeLog:
  - changeSet:
      id: 2.1-create-leads-and-analytics
      author: antiga
      changes:
        - createTable:
            tableName: leads
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: full_name, type: VARCHAR(255) }
              - column: { name: phone, type: VARCHAR(50) }
              - column: { name: email, type: VARCHAR(255) }
              - column: { name: message, type: TEXT }
              - column: { name: source, type: VARCHAR(50), defaultValue: ALL }
              - column: { name: status, type: VARCHAR(50), defaultValue: NEW }
              - column: { name: contacted, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: promo_code, type: VARCHAR(255) }
              - column: { name: requested_products, type: TEXT }
              - column: { name: liked_products_summary, type: TEXT }
              - column: { name: liked_product_links, type: TEXT }
              - column: { name: total_amount, type: DOUBLE }
              - column: { name: referrer, type: VARCHAR(255), defaultValue: WEBSITE }
              - column: { name: visualization_image_url, type: VARCHAR(1000) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMP }
        - createTable:
            tableName: analytics
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: visit_date, type: DATE }
              - column: { name: visit_count, type: BIGINT, defaultValueNumeric: 0 }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMP }
              - column: { name: deleted, type: BOOLEAN, defaultValueBoolean: false }
