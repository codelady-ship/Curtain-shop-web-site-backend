spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/properde_db
    username: postgres
    password: "entiqe#1998"
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  upload-dir: ./uploads
  jwt-secret: ${JWT_SECRET:perde-local-dev-secret-change-me}
  jwt-ttl-seconds: ${JWT_TTL_SECONDS:86400}
